<html lang="pt-BR">

</head>
<body>

  <header id="global-header">

  <!-- Container de telas (roteamento interno via JS) -->

    <!-- Telas injetadas dinamicamente:
         - tela-processos        (js/telas/tela-processos.js)

         - tela-processo         (js/telas/tela-processo.js)
    -->
  </main>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/telas/tela-processos.js"></script>
  <script src="js/telas/tela-consulta.js"></script>
  <script src="js/telas/tela-nao-registrado.js"></script>
